[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = [".venv", "data", "models", "screenshots"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # bugbear
  "SIM", # simplify
  "RUF",
]
ignore = [
  "E501",   # line length (handled by formatter)
  "B008",   # function call in default arg (FastAPI's pattern)
  "RUF012", # mutable class attrs without ClassVar
  "RUF002", # ambiguous unicode in docstrings (intentional × for "by")
  "RUF003", # ambiguous unicode in comments (intentional σ, ×, etc.)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011", "S101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["backend"]
addopts = "-ra --strict-markers"
